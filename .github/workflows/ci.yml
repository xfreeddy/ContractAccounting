name: CI

# Запускаем при каждом push и pull request в любую ветку,
# а также вручную из вкладки Actions на GitHub.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Тесты, линтер и сборка .exe
    runs-on: windows-latest

    steps:
      - name: Получить исходный код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Проверка кода линтером flake8
        # Не блокирует пайплайн при замечаниях линтера,
        # но результат виден в логе.
        run: flake8 . --max-line-length=120 --exclude=.venv,venv,build,dist
        continue-on-error: true

      - name: Запуск модульных тестов (pytest)
        run: pytest -v

      - name: Сборка исполняемого файла (PyInstaller)
        run: >-
          pyinstaller --noconfirm --onefile --windowed
          --name "ContractAccounting"
          --hidden-import=PySide6
          --hidden-import=pyodbc
          --hidden-import=bcrypt
          main.py

      - name: Загрузить готовый .exe как артефакт сборки
        uses: actions/upload-artifact@v4
        with:
          name: ContractAccounting-exe
          path: dist/ContractAccounting.exe
